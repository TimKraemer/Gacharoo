services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gacharoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gacharoo}
      POSTGRES_DB: gacharoo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gacharoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://gacharoo:${POSTGRES_PASSWORD:-gacharoo}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me-umami-secret}
      DISABLE_TELEMETRY: 1
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - umami

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
